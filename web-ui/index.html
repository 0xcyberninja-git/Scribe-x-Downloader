<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIBEX - Document Downloader</title>
    <meta name="description" content="SCRIBEX - A premium document downloader utility.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    </svg>
                </span>
                <h1>SCRIBEX</h1>
            </div>
            <p class="subtitle">Extract and Download Documents Securely</p>
        </header>

        <main>
            <div class="input-section">
                <label for="url-input">Document URL</label>
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="https://www.scribd.com/doc/..." autocomplete="off">
                    <button id="download-btn">
                        <span>Initialize</span>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="8 17 12 21 16 17"></polyline>
                            <line x1="12" y1="12" x2="12" y2="21"></line>
                            <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="terminal-container">
                <div class="terminal-header">
                    <div class="terminal-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="terminal-title">SCRIBEX Output</div>
                </div>
                <div class="terminal-body" id="terminal-output">
                    <div class="line sys-msg">SCRIBEX v1.0.0 - Ready</div>
                    <div class="line sys-msg">Waiting for user input...</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="credits">
                This Tool developed by 
                <a href="https://www.linkedin.com/in/pratiekbhivgade/" target="_blank" rel="noopener noreferrer" class="credit-link">
                    Prateek Bheevgade
                </a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
